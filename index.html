<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أمانك | Amanak Platform</title>
    <style>
        /* تعريف الألوان من الشعار */
        :root {
            --main-blue: #3a7bd5;
            --main-purple: #924fa0;
            --light-bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo img {
            width: 150px;
            margin-bottom: 20px;
        }

        /* نظام الصفحات (Steps) */
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: var(--main-purple); font-size: 1.5rem; }
        p { color: #666; line-height: 1.6; }

        /* الأزرار */
        .btn-main {
            background: linear-gradient(135deg, var(--main-blue), var(--main-purple));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-main:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-option {
            background: #fff;
            border: 2px solid var(--main-blue);
            color: var(--main-blue);
            padding: 15px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-option:hover {
            background: var(--main-blue);
            color: white;
        }

        /* التقرير النهائي */
        .report-card {
            background: #eef9f2;
            border: 1px solid #c3e6cb;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-top: 20px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--main-purple);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
